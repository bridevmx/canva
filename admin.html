<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StickerMaker - Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/pocketbase@0.26.0/dist/pocketbase.umd.js"></script>
  <script src="auth.js"></script>
  <script>
    if (!isAuthenticated()) { window.location.replace('/login?redirectTo=/admin'); }
    else if (!isAdmin()) { window.location.replace('/canvas'); }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <style>
    [x-cloak]{display:none!important}
  </style>
</head>
<body>
  <div x-data="adminView" x-init="init()" class="min-h-screen bg-slate-100" x-cloak>
    <header class="bg-white border-b border-slate-200 px-4 py-3 flex items-center justify-between shadow-sm sticky top-0 z-50">
      <div class="flex items-center gap-2">
        <span class="text-xl">🏠</span>
        <span class="font-bold text-slate-800">StickerMaker</span>
        <span class="text-xs bg-violet-100 text-violet-700 rounded-full px-2 py-0.5 font-bold ml-1">Admin</span>
      </div>
      <div class="flex items-center gap-2">
        <button @click="window.location.href='/canvas'" class="px-3 py-1.5 rounded-lg bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-semibold transition">
          ✏️ Canvas
        </button>
        <span class="text-sm text-slate-500 hidden sm:inline truncate max-w-[120px]" x-text="$store.auth.user?.name || $store.auth.user?.email"></span>
        <button @click="$store.auth.logout()" class="px-3 py-1.5 rounded-lg bg-red-50 hover:bg-red-100 text-red-600 text-xs font-semibold transition">
          Salir
        </button>
      </div>
    </header>
    <main class="max-w-5xl mx-auto px-4 py-6">
      <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6">
        <div class="bg-white rounded-2xl p-4 border border-slate-200 shadow-sm">
          <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Total</p>
          <p class="text-3xl font-black text-slate-800 mt-1" x-text="orders.length"></p>
        </div>
        <div class="bg-amber-50 rounded-2xl p-4 border border-amber-200 shadow-sm">
          <p class="text-[10px] font-bold text-amber-600 uppercase tracking-wider">Pendientes</p>
          <p class="text-3xl font-black text-amber-700 mt-1" x-text="orders.filter(o=>o.status==='pendiente').length"></p>
        </div>
        <div class="bg-blue-50 rounded-2xl p-4 border border-blue-200 shadow-sm">
          <p class="text-[10px] font-bold text-blue-600 uppercase tracking-wider">Para imprimir</p>
          <p class="text-3xl font-black text-blue-700 mt-1" x-text="orders.filter(o=>o.status==='para_imprimir').length"></p>
        </div>
        <div class="bg-emerald-50 rounded-2xl p-4 border border-emerald-200 shadow-sm">
          <p class="text-[10px] font-bold text-emerald-600 uppercase tracking-wider">Impresos</p>
          <p class="text-3xl font-black text-emerald-700 mt-1" x-text="orders.filter(o=>o.status==='impreso').length"></p>
        </div>
      </div>
      <div class="flex items-center gap-2 mb-4 flex-wrap">
        <span class="text-xs font-bold text-slate-500 uppercase tracking-wider mr-1">Filtrar:</span>
        <template x-for="f in ['todos','pendiente','para_imprimir','impreso']" :key="f">
          <button @click="filter=f" :class="filter===f ? 'bg-slate-800 text-white shadow' : 'bg-white text-slate-700 border border-slate-200'" class="px-3 py-1.5 rounded-xl text-xs font-semibold transition" x-text="f==='todos' ? 'Todos' : f.replace('_',' ')"></button>
        </template>
        <button @click="loadOrders()" class="ml-auto px-3 py-1.5 rounded-xl bg-violet-100 hover:bg-violet-200 text-violet-700 text-xs font-semibold transition flex items-center gap-1">
          <span :class="loading ? 'animate-spin inline-block' : ''">↻</span> Actualizar
        </button>
      </div>
      <div x-show="loading && orders.length === 0" class="text-center py-16 text-slate-400">
        <div class="text-4xl mb-3 animate-pulse">⏳</div>
        <p class="text-sm">Cargando pedidos…</p>
      </div>
      <div x-show="!loading && filteredOrders().length === 0" class="text-center py-16 text-slate-400">
        <div class="text-4xl mb-3">📭</div>
        <p class="text-sm">No hay pedidos en esta categoría</p>
      </div>
      <div class="space-y-3">
        <template x-for="order in filteredOrders()" :key="order.id">
          <div class="bg-white rounded-2xl border border-slate-200 p-4 shadow-sm hover:shadow-md transition">
            <div class="flex flex-col sm:flex-row sm:items-center gap-3">
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 flex-wrap mb-1">
                  <h3 class="font-bold text-slate-800 truncate" x-text="order.client_name || 'Sin nombre'"></h3>
                  <span class="text-[10px] px-2 py-0.5 rounded-full font-bold shrink-0 uppercase tracking-wide" :class="{'bg-amber-100 text-amber-700': order.status==='pendiente','bg-blue-100 text-blue-700': order.status==='para_imprimir','bg-emerald-100 text-emerald-700': order.status==='impreso'}" x-text="order.status?.replace('_',' ')"></span>
                </div>
                <p class="text-xs text-slate-400">
                  <span x-text="new Date(order.created).toLocaleString('es-MX')"></span>
                  · <span class="font-semibold" x-text="(order.paper_size||'a4').toUpperCase()"></span>
                </p>
              </div>
              <div class="flex items-center gap-1.5 flex-wrap shrink-0">
                <button @click="openInCanvas(order.id)" class="flex items-center gap-1 px-2.5 py-1.5 rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-semibold transition">✏️ Editar</button>
                <button @click="copyPrintUrl(order.id)" class="flex items-center gap-1 px-2.5 py-1.5 rounded-xl bg-blue-50 hover:bg-blue-100 text-blue-700 text-xs font-semibold transition">🔗 URL</button>
                <button @click="openPrint(order.id)" class="flex items-center gap-1 px-2.5 py-1.5 rounded-xl bg-violet-100 hover:bg-violet-200 text-violet-700 text-xs font-semibold transition">🖨️ Imprimir</button>
                <template x-if="order.status !== 'impreso'">
                  <button @click="markPrinted(order.id)" class="flex items-center gap-1 px-2.5 py-1.5 rounded-xl bg-emerald-50 hover:bg-emerald-100 text-emerald-700 text-xs font-semibold transition">✅ Impreso</button>
                </template>
              </div>
            </div>
          </div>
        </template>
      </div>
    </main>
  </div>

  <script>
    document.addEventListener('alpine:init', () => {
      Alpine.data('adminView', () => ({
        orders: [], loading: false, filter: 'todos',
        async init() {
          await this.loadOrders();
        },
        async loadOrders() {
          this.loading = true;
          try {
            const result = await this.$store.auth.pb.collection('sticker_orders').getList(1, 200, { sort: '-created' });
            this.orders = result.items;
          } catch(e) { console.error(e); }
          finally { this.loading = false; }
        },
        filteredOrders() {
          return this.filter === 'todos' ? this.orders : this.orders.filter(o => o.status === this.filter);
        },
        openInCanvas(id) { window.location.href = '/canvas?id=' + id; },
        getPrintUrl(id) { return window.location.origin + '/print?id=' + id; },
        copyPrintUrl(id) { navigator.clipboard.writeText(this.getPrintUrl(id)); alert('URL copiada al portapapeles.'); },
        openPrint(id) { window.open(this.getPrintUrl(id), '_blank'); },
        async markPrinted(id) {
          try {
            await this.$store.auth.pb.collection('sticker_orders').update(id, { status: 'impreso' });
            const o = this.orders.find(x => x.id === id);
            if (o) o.status = 'impreso';
          } catch(e) { alert('Error al actualizar el estado.'); }
        }
      }));
    });
  </script>
</body>
</html>

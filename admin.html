<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StickerMaker - Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/pocketbase@0.26.0/dist/pocketbase.umd.js"></script>
  <script src="auth.js"></script>
  <script>
    if (!isAuthenticated()) { window.location.replace('/login?redirectTo=/admin'); }
    else if (!isAdmin()) { window.location.replace('/canvas'); }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <style>
    [x-cloak]{display:none!important}
  </style>
</head>
<body>
  <div x-data="adminView" x-init="init()" class="min-h-screen bg-slate-100" x-cloak>
    <header class="bg-white border-b border-slate-200 px-4 py-3 flex items-center justify-between shadow-sm sticky top-0 z-50">
      <div class="flex items-center gap-2">
        <span class="text-xl">🏠</span>
        <span class="font-bold text-slate-800">StickerMaker</span>
        <span class="text-xs bg-violet-100 text-violet-700 rounded-full px-2 py-0.5 font-bold ml-1">Admin</span>
      </div>
      <div class="flex items-center gap-2">
        <button @click="window.location.href='/canvas'" class="px-3 py-1.5 rounded-lg bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-semibold transition">
          ✏️ Canvas
        </button>
        <span class="text-sm text-slate-500 hidden sm:inline truncate max-w-[120px]" x-text="$store.auth.user?.name || $store.auth.user?.email"></span>
        <button @click="$store.auth.logout()" class="px-3 py-1.5 rounded-lg bg-red-50 hover:bg-red-100 text-red-600 text-xs font-semibold transition">
          Salir
        </button>
      </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-6">
      <!-- Estadísticas -->
      <div class="grid grid-cols-2 sm:grid-cols-5 gap-3 mb-6">
        <div class="bg-white rounded-2xl p-4 border border-slate-200 shadow-sm">
          <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Total</p>
          <p class="text-3xl font-black text-slate-800 mt-1" x-text="orders.length"></p>
        </div>
        <div class="bg-amber-50 rounded-2xl p-4 border border-amber-200 shadow-sm">
          <p class="text-[10px] font-bold text-amber-600 uppercase tracking-wider">Recibidos</p>
          <p class="text-3xl font-black text-amber-700 mt-1" x-text="orders.filter(o=>o.status==='recibido').length"></p>
        </div>
        <div class="bg-violet-50 rounded-2xl p-4 border border-violet-200 shadow-sm">
          <p class="text-[10px] font-bold text-violet-600 uppercase tracking-wider">En Ajuste</p>
          <p class="text-3xl font-black text-violet-700 mt-1" x-text="orders.filter(o=>o.status==='ajuste_diseno').length"></p>
        </div>
        <div class="bg-blue-50 rounded-2xl p-4 border border-blue-200 shadow-sm">
          <p class="text-[10px] font-bold text-blue-600 uppercase tracking-wider">Producción</p>
          <p class="text-3xl font-black text-blue-700 mt-1" x-text="orders.filter(o=>o.status==='produccion').length"></p>
        </div>
        <div class="bg-emerald-50 rounded-2xl p-4 border border-emerald-200 shadow-sm">
          <p class="text-[10px] font-bold text-emerald-600 uppercase tracking-wider">Finalizados</p>
          <p class="text-3xl font-black text-emerald-700 mt-1" x-text="orders.filter(o=>o.status==='finalizado').length"></p>
        </div>
      </div>

      <!-- Filtros -->
      <div class="flex items-center gap-2 mb-4 flex-wrap">
        <span class="text-xs font-bold text-slate-500 uppercase tracking-wider mr-1">Filtrar:</span>
        <template x-for="f in ['todos','recibido','ajuste_diseno','produccion','finalizado','cancelado']" :key="f">
          <button @click="filter=f" 
            :class="filter===f ? 'bg-slate-800 text-white shadow' : 'bg-white text-slate-700 border border-slate-200'" 
            class="px-3 py-1.5 rounded-xl text-xs font-semibold transition" 
            x-text="f==='todos' ? 'Todos' : f.replace('_',' ')"></button>
        </template>
        <button @click="loadOrders()" class="ml-auto px-3 py-1.5 rounded-xl bg-violet-100 hover:bg-violet-200 text-violet-700 text-xs font-semibold transition flex items-center gap-1">
          <span :class="loading ? 'animate-spin inline-block' : ''">↻</span> Actualizar
        </button>
      </div>

      <!-- Lista de Pedidos -->
      <div class="space-y-3">
        <template x-for="order in filteredOrders()" :key="order.id">
          <div class="bg-white rounded-2xl border border-slate-200 p-4 shadow-sm hover:shadow-md transition">
            <div class="flex flex-col sm:flex-row sm:items-center gap-3">
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 flex-wrap mb-1">
                  <h3 class="font-bold text-slate-800 truncate" x-text="order.title || 'Sin nombre'"></h3>
                  <span class="text-[10px] px-2 py-0.5 rounded-full font-bold shrink-0 uppercase tracking-wide" 
                    :class="{
                      'bg-amber-100 text-amber-700': order.status==='recibido',
                      'bg-violet-100 text-violet-700': order.status==='ajuste_diseno',
                      'bg-blue-100 text-blue-700': order.status==='produccion',
                      'bg-emerald-100 text-emerald-700': order.status==='finalizado',
                      'bg-slate-100 text-slate-500': order.status==='cancelado'
                    }" 
                    x-text="order.status?.replace('_',' ')"></span>
                </div>
                <p class="text-xs text-slate-400">
                  <span x-text="new Date(order.created).toLocaleString('es-MX')"></span>
                  · <span class="font-semibold" x-text="(order.paper_size||'a4').toUpperCase()"></span>
                  <template x-if="order.admin_canvas_data">
                    <span class="ml-2 text-violet-500 font-bold">✓ Editado por Admin</span>
                  </template>
                </p>
              </div>
              
              <div class="flex items-center gap-1.5 flex-wrap shrink-0">
                <!-- Botón Editar (Siempre) -->
                <button @click="openInCanvas(order.id)" class="flex items-center gap-1 px-2.5 py-1.5 rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-semibold transition">✏️ Editar</button>
                
                <!-- Botón A Producción (Si aún no está en prod) -->
                <template x-if="order.status === 'recibido' || order.status === 'ajuste_diseno'">
                  <button @click="updateStatus(order.id, 'produccion')" class="flex items-center gap-1 px-2.5 py-1.5 rounded-xl bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold transition shadow-md shadow-blue-200">🚀 A Producción</button>
                </template>

                <!-- Menú Imprimir -->
                <button @click="openPrint(order.id)" class="flex items-center gap-1 px-2.5 py-1.5 rounded-xl bg-violet-100 hover:bg-violet-200 text-violet-700 text-xs font-semibold transition">🖨️ Imprimir</button>
                
                <!-- Botón Finalizar -->
                <template x-if="order.status === 'produccion'">
                  <button @click="updateStatus(order.id, 'finalizado')" class="flex items-center gap-1 px-2.5 py-1.5 rounded-xl bg-emerald-50 hover:bg-emerald-100 text-emerald-700 text-xs font-semibold transition">✅ Finalizar</button>
                </template>

                <!-- Botón Cancelar (Oculto en finalizado/cancelado) -->
                <template x-if="order.status !== 'finalizado' && order.status !== 'cancelado'">
                  <button @click="if(confirm('¿Cancelar orden?')) updateStatus(order.id, 'cancelado')" class="p-1.5 rounded-xl hover:bg-red-50 text-red-300 hover:text-red-500 transition" title="Cancelar">🚫</button>
                </template>
              </div>
            </div>
          </div>
        </template>
      </div>
    </main>
  </div>

  <script>
    document.addEventListener('alpine:init', () => {
      Alpine.data('adminView', () => ({
        orders: [], loading: false, filter: 'todos',
        async init() {
          await this.loadOrders();
        },
        async loadOrders() {
          this.loading = true;
          try {
            const result = await this.$store.auth.pb.collection('sticker_orders').getList(1, 200, { sort: '-created' });
            this.orders = result.items;
          } catch(e) { console.error(e); }
          finally { this.loading = false; }
        },
        filteredOrders() {
          return this.filter === 'todos' ? this.orders : this.orders.filter(o => o.status === this.filter);
        },
        openInCanvas(id) { window.location.href = '/canvas?id=' + id; },
        getPrintUrl(id) { return window.location.origin + '/print?id=' + id; },
        openPrint(id) { window.open(this.getPrintUrl(id), '_blank'); },
        async updateStatus(id, newStatus) {
          try {
            await this.$store.auth.pb.collection('sticker_orders').update(id, { status: newStatus });
            const o = this.orders.find(x => x.id === id);
            if (o) o.status = newStatus;
          } catch(e) { alert('Error al actualizar el estado.'); }
        }
      }));
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StickerMaker - Iniciar sesión</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/pocketbase@0.26.0/dist/pocketbase.umd.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="auth.js"></script>
  <script>
    if (isAuthenticated()) {
      const ALLOWED_REDIRECTS = ['/canvas', '/admin', '/register', '/dashboard']
      const qs = new URLSearchParams(window.location.search)
      const redirect = qs.get('redirectTo')
      window.location.replace(ALLOWED_REDIRECTS.includes(redirect) ? redirect : '/dashboard')
    }
  </script>
  <style> [x-cloak]{display:none!important} </style>
</head>
<body>
  <div x-data="authView" class="min-h-screen bg-gradient-to-br from-slate-900 via-violet-950 to-slate-900 flex items-center justify-center p-4">
    <div class="w-full max-w-sm">
      <div class="text-center mb-8">
        <span class="text-5xl">🔑</span>
        <h1 class="text-2xl font-black text-white mt-3 tracking-tight" x-text="$store.app.name"></h1>
        <p class="text-slate-400 text-sm mt-1">Accede a tu cuenta</p>
      </div>
      
      <div class="bg-white/5 border border-white/10 rounded-2xl p-6 sm:p-8 space-y-4 backdrop-blur-sm shadow-xl">
        <div x-show="error" x-cloak class="bg-red-500/10 text-red-400 border border-red-500/30 rounded-xl px-4 py-3 text-sm text-center" x-text="error"></div>
        <div x-show="successMsg" x-cloak class="bg-emerald-500/10 text-emerald-400 border border-emerald-500/30 rounded-xl px-4 py-3 text-sm text-center" x-text="successMsg"></div>

        <!-- TABS (HIDDEN FOR NOW) -->
        <!-- <div class="flex bg-white/10 rounded-xl p-1 mb-6">
          <button @click="tab = 'pwd'; error = ''" :class="tab === 'pwd' ? 'bg-white/20 text-white shadow' : 'text-slate-400 hover:text-slate-200'" class="flex-1 py-1.5 text-xs font-bold rounded-lg transition">Correo / Usuario</button>
          <button @click="tab = 'otp'; error = ''" :class="tab === 'otp' ? 'bg-white/20 text-white shadow' : 'text-slate-400 hover:text-slate-200'" class="flex-1 py-1.5 text-xs font-bold rounded-lg transition">Celular (SMS)</button>
        </div> -->

        <!-- 1) LOGIN CON PASSWORD (POCKETBASE STANDARD) -->
        <template x-if="tab === 'pwd'">
          <div class="space-y-4">
            <div>
              <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider block mb-1">Email, Usuario o Teléfono</label>
              <input x-model="identity" type="text" placeholder="Correo, usuario o celular" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-sm text-white placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-violet-500 transition" />
            </div>
            <div>
              <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider block mb-1">Contraseña</label>
              <input x-model="password" type="password" placeholder="••••••••" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-sm text-white placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-violet-500 transition" @keydown.enter="loginPassword()" />
            </div>
            <button @click="loginPassword()" :disabled="loading || !identity || !password" class="w-full bg-violet-600 hover:bg-violet-500 active:bg-violet-700 disabled:opacity-50 rounded-xl py-3 text-sm font-bold text-white transition mt-2 shadow-lg" x-text="loading ? 'Iniciando sesión…' : 'Ingresar'"></button>
          </div>
        </template>

        <!-- 2) LOGIN CON OTP (SMS - LEGACY - OCULTO) -->
        <!-- <template x-if="tab === 'otp'">
          ... código oculto ...
        </template> -->

        <p class="text-center text-slate-500 text-xs pt-3 mt-4 border-t border-white/10 leading-relaxed">
          ¿No tienes cuenta? <a href="/register" class="text-violet-400 hover:text-violet-300 font-bold transition">Regístrate gratis</a><br><br>
          <a href="/" class="text-slate-600 hover:text-slate-400 transition">← Volver al inicio</a>
        </p>

      </div>
    </div>
  </div>

  <script>
    document.addEventListener('alpine:init', () => {
      Alpine.data('authView', () => ({
        tab: 'pwd', otpStep: 1,
        identity: '', phone: '', password: '', otpCode: '',
        loading: false, error: '', successMsg: '',
        
        async loginPassword() {
          this.error = ''; this.loading = true;
          try {
            await this.$store.auth.pb.collection('users_canva').authWithPassword(this.identity, this.password);
            
            // Redirigir según el tipo de usuario o parámetro
            const ALLOWED_REDIRECTS = ['/canvas', '/admin', '/register', '/dashboard'];
            const qs = new URLSearchParams(window.location.search);
            const redirect = qs.get('redirectTo');
            window.location.replace(ALLOWED_REDIRECTS.includes(redirect) ? redirect : '/dashboard');
          } catch(e) {
            this.error = e?.data?.message || 'Credenciales incorrectas o cuenta no verificada';
          } finally { this.loading = false; }
        },

        async requestOTP() {
          this.error = ''; this.loading = true;
          try {
            await this.$store.auth.pb.send("/api/auth/login-otp", {
               method: "POST",
               body: { phone: this.phone }
            });
            this.otpStep = 2;
          } catch(e) {
            this.error = 'No se encontró el teléfono o error de red.';
          } finally { this.loading = false; }
        },

        async verifyOTP() {
          this.error = ''; this.loading = true;
          try {
            const res = await this.$store.auth.pb.send("/api/auth/verify-otp", {
              method: "POST",
              body: { phone: this.phone, code: this.otpCode }
            });
            if (res.token) {
              this.$store.auth.pb.authStore.save(res.token, res.record);
              window.location.replace('/dashboard');
            }
          } catch(e) { this.error = 'Código inválido'; }
          finally { this.loading = false; }
        }
      }));
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Impresión de Pedido</title>
  <script src="https://cdn.jsdelivr.net/npm/pocketbase@0.26.0/dist/pocketbase.umd.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <style>
    /* Estilos base optimizados para impresión */
    html, body {
      margin: 0;
      padding: 0;
      background: white;
      font-family: Inter, sans-serif;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    .sheet {
      position: relative;
      overflow: hidden;
      background: white;
      page-break-after: always;
      break-after: page;
    }
    .text-box {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.05;
      padding: 6px;
    }
    .no-render { display: none !important; }
    [x-cloak] { display: none !important; }
    
    /* Reglas específicas para Puppeteer */
    @media screen {
      body { background: #f1f5f9; padding: 2rem; }
      .sheet { margin: 0 auto 2rem auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    }
  </style>
</head>
<body x-data="headlessPrint" x-init="init()">

  <!-- Pantalla de Estado (Visible solo en navegador normal, Puppeteer la ignorará si el selector es .sheet) -->
  <div x-show="!ready" class="fixed inset-0 flex items-center justify-center bg-white z-[9999]">
    <div class="text-center">
      <template x-if="status === 'loading'">
        <div class="animate-spin text-4xl mb-4">🌀</div>
      </template>
      <template x-if="status === 'error'">
        <div class="text-4xl mb-4">⚠️</div>
      </template>
      <p class="text-slate-600 font-bold" x-text="statusText"></p>
    </div>
  </div>

  <!-- Contenedor Principal de Impresión -->
  <div id="print-container" x-show="ready" x-cloak>
    <template x-for="p in pagesCount" :key="p">
      <div class="sheet" :style="{ background: pageColors[p] || '#ffffff', width: sheet.w + 'px', height: sheet.h + 'px' }">
        <template x-for="item in sortedItems().filter(i => (i.page||1) === p)" :key="item.id">
          <div :style="itemStyle(item)" class="absolute pointer-events-none">
            
            <!-- Imagen -->
            <template x-if="item.type === 'image'">
              <img :src="item.src" class="w-full h-full" :style="{ objectFit: item.fit || 'contain' }" />
            </template>
            
            <!-- Texto -->
            <template x-if="item.type === 'text'">
              <div class="text-box" :style="{ 
                fontFamily: item.fontFamily, 
                color: item.color, 
                fontSize: item.fontSize + 'px', 
                fontWeight: item.fontWeight, 
                textShadow: item.textShadow ? `${item.shadowOffsetX}px ${item.shadowOffsetY}px ${item.shadowBlur}px ${item.shadowColor}` : 'none', 
                '-webkit-text-stroke': item.textOutline ? `${item.outlineWidth}px ${item.outlineColor}` : 'none' 
              }" x-text="item.text"></div>
            </template>
            
            <!-- Forma -->
            <template x-if="item.type === 'shape'">
              <div class="w-full h-full" :style="{ 
                background: item.fillColor ?? '#3b82f6', 
                borderRadius: item.shapeType === 'circle' ? '50%' : '4px', 
                border: (item.strokeWidth ?? 0) > 0 ? `${item.strokeWidth}px solid ${item.strokeColor}` : 'none', 
                boxSizing: 'border-box' 
              }"></div>
            </template>

          </div>
        </template>
      </div>
    </template>
  </div>

  <script>
    // Flag global para que Puppeteer sepa cuando terminar
    window.RENDER_READY = false;

    document.addEventListener('alpine:init', () => {
      Alpine.data('headlessPrint', () => ({
        ready: false,
        status: 'loading',
        statusText: 'Cargando datos...',
        items: [],
        pageColors: { 1: '#ffffff' },
        pagesCount: 1,
        sheet: { w: 794, h: 1123 },
        paperSize: 'a4',

        async init() {
          const pb = new PocketBase('https://scraping.pockethost.io');
          const qs = new URLSearchParams(window.location.search);
          const id = qs.get('id');
          const token = qs.get('token');

          // Aplicar token si viene en la URL (para el bot de impresión)
          if (token) pb.authStore.save(token, null);

          // Redirección de seguridad si no hay sesión válida (para humanos)
          if (!pb.authStore.isValid) {
            window.location.replace('/login?redirectTo=/print' + window.location.search);
            return;
          }
          
          if (!id) {
            this.status = 'error';
            this.statusText = 'ID de pedido faltante';
            return;
          }

          try {
            const rec = await pb.collection('sticker_orders').getOne(id);
            this.paperSize = rec.paper_size || 'a4';
            
            // Configuración de página
            if (this.paperSize === 'a4') { this.sheet = { w: 794, h: 1123 }; }
            else { this.sheet = { w: 816, h: 1056 }; }

            // Inyección de estilos de página para el PDF
            const style = document.createElement('style');
            style.innerHTML = `@page { size: ${this.paperSize === 'a4' ? 'A4' : 'letter'}; margin: 0; }`;
            document.head.appendChild(style);

            // Determinar fuente de datos (Admin vs Cliente)
            let rawData = rec.admin_canvas_data;
            if (!rawData || (typeof rawData === 'string' && rawData.length < 5)) {
              rawData = rec.canvas_data;
            }

            const data = typeof rawData === 'string' ? JSON.parse(rawData) : rawData;
            this.items = data.items || [];
            this.pageColors = data.pageColors || { 1: rec.page_bg || '#ffffff' };
            
            let maxPage = 1;
            this.items.forEach(item => {
              if (item.page === undefined) item.page = 1;
              if (item.page > maxPage) maxPage = item.page;
              
              // Resolver URLs de imágenes de PocketBase
              if (item.type === 'image' && item.src?.startsWith('FILE:')) {
                const prefix = item.src.replace('FILE:','').split('.')[0].replace(/-/g,'_');
                const assets = Array.isArray(rec.upload_assets) ? rec.upload_assets : [rec.upload_assets];
                const fn = assets.find(f => f.startsWith(prefix) || f.includes(prefix));
                if (fn) item.src = pb.files.getUrl(rec, fn);
              }
            });
            this.pagesCount = maxPage;

            // Esperar a que las imágenes se carguen completamente
            this.$nextTick(async () => {
              const images = Array.from(document.querySelectorAll('img'));
              await Promise.all(images.map(img => {
                if (img.complete) return Promise.resolve();
                return new Promise(resolve => {
                  img.onload = resolve;
                  img.onerror = resolve;
                });
              }));
              
              // Margen de seguridad para renderizado de fuentes
              setTimeout(() => {
                this.ready = true;
                this.status = 'ready';
                window.RENDER_READY = true;
                
                // Disparar impresión automática (ideal con --kiosk-printing)
                window.print();
                
                console.log('--- RENDER_READY & PRINTING ---');
              }, 500);
            });

          } catch (e) {
            console.error(e);
            this.status = 'error';
            this.statusText = 'Error al recuperar el pedido';
          }
        },

        itemStyle(item) {
          return {
            left: item.x + 'px',
            top: item.y + 'px',
            width: item.w + 'px',
            height: item.h + 'px',
            zIndex: item.z,
            opacity: item.opacity ?? 1,
            transform: item.rotation ? `rotate(${item.rotation}deg)` : 'none'
          };
        },

        sortedItems() {
          return [...this.items].sort((a, b) => a.z - b.z);
        }
      }));
    });
  </script>
</body>
</html>

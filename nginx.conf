limit_req_zone $binary_remote_addr zone=login_zone:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_zone:10m rate=10r/m;

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Headers de seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Redirige .html → URL limpia (solo cuando el usuario escribe .html manualmente)
    location ~ ^(.+)\.html$ {
        return 301 $1;
    }

    # ✅ Exact match (=) evita conflicto con try_files interno
    location = /login {
        limit_req zone=login_zone burst=3 nodelay;
        try_files /login.html =404;
    }

    location = /register {
        limit_req zone=login_zone burst=3 nodelay;
        try_files /register.html =404;
    }

    # Assets estáticos — van ANTES de location / para mayor prioridad
    location ~* \.(css|js|png|jpg|svg|ico|woff2|ttf|woff|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ✅ Fallback =404 en lugar de /index.html — evita el internal redirect loop
    # Esta app es multi-página, no SPA, cada ruta tiene su propio .html
    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}

server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        
        # Intenta servir el recurso exacto, luego con .html, luego como carpeta
        try_files $uri $uri.html $uri/ =404;
    }

    # Desactivar logs de archivos no encontrados para evitar ruido
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Configuración de caché para archivos estáticos (opcional pero recomendado)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Prevenir acceso a archivos ocultos como .git
    location ~ /\. {
        deny all;
    }
}

limit_req_zone $binary_remote_addr zone=login_zone:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_zone:10m rate=10r/m;

server {
    listen 80;
    root /usr/share/nginx/html;

    # Headers de seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Página de error personalizada
    error_page 404 /404.html;

    # ✅ Raíz → sirve index.html directamente sin pasar por el directive `index`
    # Evita el loop: / → index.html → regex → /index → loop
    location = / {
        try_files /index.html =404;
    }

    # ✅ Redirige /index y /index.html explícitamente a /
    location = /index {
        return 301 /;
    }
    location = /index.html {
        return 301 /;
    }

    # ✅ 404.html con exact match — evita que la regla regex lo atrape
    # y genera loop al servirse como error_page interno
    location = /404.html {
        try_files /404.html =500;
    }

    # Redirige cualquier otra URL con .html → URL limpia
    location ~ ^/(.+)\.html$ {
        return 301 /$1;
    }

    # Rate limiting en rutas de auth (exact match)
    location = /login {
        limit_req zone=login_zone burst=3 nodelay;
        try_files /login.html =404;
    }

    location = /register {
        limit_req zone=login_zone burst=3 nodelay;
        try_files /register.html =404;
    }

    location = /dashboard {
        try_files /dashboard.html =404;
    }

    # Assets estáticos
    location ~* \.(css|js|png|jpg|svg|ico|woff2|ttf|woff|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Resto de páginas con URL limpia
    location / {
        try_files $uri $uri.html =404;
    }
}
